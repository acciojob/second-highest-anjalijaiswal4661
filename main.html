<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>	
	<script>
		function secondHighest(arr) {
			//Write your code here
			if(arr.length<2){
				return -Infinity
			}
			
				arr.sort((a,b)=>a-b);
				let n=1
				let max=arr[arr.length-n]
				let secmax;
					while(n < arr.length&&max>arr[arr.length-n-1]){
					secmax=arr[arr.length-n-1]
						n++;
					}
				if(secmax === undefined) return -Infinity;
				return secmax
			}
		

		function Main() {
			var n = prompt("Enter the number of elements");
			var arr = [];
			for (var i = 0; i < n; i++) {
				arr[i] =Number(prompt("Enter element " + (i+1)));
			}
			alert(secondHighest(arr));
		}
		Main();
	</script>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
